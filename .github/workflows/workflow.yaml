on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: login docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: build image and push to dockerhub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ajeeshregi/allianz-repo:${{ github.sha }}
  
    - name: Update application Repo
      run: |
        git clone https://${{ secrets.GITOPS_PAT }}@github.com/Ajeeshregi/argocdrepo.git

        cd argocdrepo

        sed -i "s|image:.*|image: ajeeshregi/allianz-repo:${GITHUB_SHA}|g" argocddep.yaml
        git config user.name "gha"
        git config user.email "gha@github.com"

        git add .
        git commit -m "update image tag to ${GITHUB_SHA}"
        git push